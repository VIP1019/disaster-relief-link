<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliefLink - Login</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .password-field { position: relative; }
        .password-field .form-control { padding-right: 46px; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; border: 0; background: transparent; color: var(--text-subtle); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; }
        .password-toggle:hover { background: #ebecf0; color: var(--text-main); }
        .password-toggle svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container animate-fade-in">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome to the Global Command.</h1>
                <p>Authorized access for <strong>MDRRMO Daet</strong> and barangay officials (Camarines Norte).</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username or Government Email</label>
                    <input type="text" id="username" name="username" class="form-control" required placeholder="e.g. j.doe@agency.gov">
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <label class="form-label" for="password">Password</label>
                        <a href="#" style="font-size: 11px; margin-bottom: 4px; font-weight: 600;">Forgot Access Code?</a>
                    </div>
                    <div class="password-field">
                        <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••••••">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password" title="Show password">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember" style="width: 14px; height: 14px;">
                    <label for="remember" style="font-size: 12px; color: var(--text-subtle);">Remember this terminal for 24 hours</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Authenticate Identity <span style="margin-left: 4px;">→</span>
                </button>

                <div id="loginError" class="form-error" style="text-align: center; margin-top: 16px;"></div>
            </form>

            <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
                <p style="font-size: 13px; color: var(--text-subtle);">
                    Don't have an account? <a href="register.html" style="font-weight: 600;">Request Access</a>
                </p>
            </div>
            
            <div style="display: flex; justify-content: center; gap: 16px; margin-top: 24px; font-size: 10px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 1px;">
                <span>Privacy Framework</span>
                <span>Incident Protocol</span>
                <span>v4.6.2-Relief</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('passwordToggle').addEventListener('click', () => {
            const input = document.getElementById('password');
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            const label = showing ? 'Show password' : 'Hide password';
            document.getElementById('passwordToggle').setAttribute('aria-label', label);
            document.getElementById('passwordToggle').setAttribute('title', label);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.classList.add('btn-loading');
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('../php/api/auth.php?action=login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.user_type === 'admin' ? 'admin/dashboard.html' : 'user/dashboard.html';
                } else {
                    document.getElementById('loginError').textContent = data.message || 'Authentication failed';
                    btn.classList.remove('btn-loading');
                    btn.disabled = false;
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'System error. Please try again.';
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        });
    </script>
    <script src="../js/validation.js"></script>
</body>
</html>
