<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliefLink - User Notifications</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
        .logo-box { width: 32px; height: 32px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; }
        .notif-item { display: flex; align-items: flex-start; gap: 16px; padding: 20px; border: 1px solid var(--border); border-radius: 12px; background: #fff; margin-bottom: 16px; transition: var(--transition); position: relative; }
        .notif-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .notif-item.unread { border-left: 4px solid var(--primary); }
        .notif-icon-box { width: 44px; height: 44px; border-radius: 10px; background: #f4f5f7; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .notif-category-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .notif-category-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: var(--transition); font-size: 13px; font-weight: 500; }
        .notif-category-item:hover, .notif-category-item.active { background: #f4f5f7; color: var(--primary); }
        .notif-category-item .count { background: #dfe1e6; padding: 2px 6px; border-radius: 10px; font-size: 11px; }
        .notif-category-item.active .count { background: var(--primary); color: #fff; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" id="relief-sidebar-mount"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h2 style="font-size: 20px;">Notifications</h2>
                    <p style="font-size: 13px; color: var(--text-subtle);">Manage your system alerts and citizen communication logs.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="button" id="markAllBtn" class="btn" style="background: #fff; border: 1px solid var(--border);">
                        <svg class="icon" style="width: 14px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Mark all as read
                    </button>
                    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--bg-sidebar); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px;">BC</div>
                </div>
            </header>

            <div style="display: grid; grid-template-columns: 240px 1fr; gap: 24px;" class="animate-fade-in">
                <!-- Category Sidebar -->
                <div>
                    <div class="card" style="padding: 16px;">
                        <h4 style="font-size: 11px; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 16px; letter-spacing: 1px;">Categories</h4>
                        <ul class="notif-category-list">
                            <li class="notif-category-item active">
                                <span>All Notifications</span>
                                <span class="count">24</span>
                            </li>
                            <li class="notif-category-item">
                                <span style="display: flex; align-items: center; gap: 8px;"><div class="dot" style="background: var(--danger); width: 6px; height: 6px; border-radius: 50%;"></div> Life Safety</span>
                                <span class="count">3</span>
                            </li>
                            <li class="notif-category-item">
                                <span style="display: flex; align-items: center; gap: 8px;"><div class="dot" style="background: var(--info); width: 6px; height: 6px; border-radius: 50%;"></div> Relief Status</span>
                                <span class="count">12</span>
                            </li>
                            <li class="notif-category-item">
                                <span style="display: flex; align-items: center; gap: 8px;"><div class="dot" style="background: var(--success); width: 6px; height: 6px; border-radius: 50%;"></div> System Updates</span>
                                <span class="count">9</span>
                            </li>
                        </ul>
                    </div>

                    <div class="card" style="background: var(--primary); color: #fff; text-align: center; padding: 24px;">
                        <div style="font-size: 12px; font-weight: 600; opacity: 0.8; margin-bottom: 8px;">Emergency Broadcast Active</div>
                        <h3 style="font-size: 20px; margin-bottom: 16px;">Typhoon Signal No. 2 in effect for your region.</h3>
                        <button class="btn" style="background: rgba(255,255,255,0.2); color: #fff; font-size: 12px; width: 100%;">View Protocol</button>
                    </div>
                </div>

                <!-- Notifications Feed -->
                <div id="notifFeed">
                    <p style="color:var(--text-subtle);padding:16px;">Loading…</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/relief-sidebar.js"></script>
    <script>
        const api = '../../php/api';

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await ReliefSidebar.mount();
            if (!user || user.user_type !== 'barangay_official') return;
            loadNotifications();
            document.getElementById('markAllBtn').addEventListener('click', markAllRead);
        });

        function fmtWhen(ts) {
            if (!ts) return '';
            try { return new Date(ts.replace(' ', 'T')).toLocaleString(); } catch (e) { return ts; }
        }

        async function loadNotifications() {
            const feed = document.getElementById('notifFeed');
            try {
                const response = await fetch(api + '/notifications.php?action=list_user', { credentials: 'include' });
                const data = await response.json();
                if (!data.success || !data.notifications || data.notifications.length === 0) {
                    feed.innerHTML = '<p style="color:var(--text-subtle);padding:16px;">No notifications yet.</p>';
                    return;
                }
                feed.innerHTML = data.notifications.map(n => {
                    const unread = !parseInt(n.is_read, 10);
                    return `
                    <div class="notif-item ${unread ? 'unread' : ''}">
                        <div class="notif-icon-box" style="color: var(--primary); background: #deebff;">
                            <svg class="icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        </div>
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                <h4 style="font-size: 15px;">${(n.notification_type || '').replace(/_/g, ' ')}</h4>
                                <span style="font-size: 12px; color: var(--text-subtle);">${fmtWhen(n.created_at)}</span>
                            </div>
                            <p style="font-size: 14px; color: var(--text-subtle); line-height: 1.4;">${(n.message || '').replace(/</g, '&lt;')}</p>
                            <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                                ${unread ? `<button type="button" class="btn btn-sm" onclick="markRead(${n.id})">Mark read</button>` : '<span class="badge" style="background:#f4f5f7;">Read</span>'}
                                <button type="button" class="btn btn-sm" style="border:1px solid var(--border);" onclick="removeNotif(${n.id})">Remove</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (error) {
                console.error('Notifications error:', error);
                feed.innerHTML = '<p style="color:var(--danger);padding:16px;">Could not load notifications.</p>';
            }
        }

        async function markRead(id) {
            await fetch(api + '/notifications.php?action=mark_read', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notification_id: id })
            });
            loadNotifications();
        }

        async function markAllRead() {
            await fetch(api + '/notifications.php?action=mark_all_read', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
            loadNotifications();
        }

        async function removeNotif(id) {
            await fetch(api + '/notifications.php?action=delete', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notification_id: id })
            });
            loadNotifications();
        }
    </script>
</body>
</html>
