<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliefLink - View Report Status</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
        .logo-box { width: 32px; height: 32px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; }
        .report-id { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--primary); background: #deebff; padding: 2px 6px; border-radius: 4px; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
        .page-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; transition: var(--transition); }
        .page-btn:hover, .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" id="relief-sidebar-mount"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h2 style="font-size: 20px;">View Report Status</h2>
                    <p style="font-size: 13px; color: var(--text-subtle);">Track and monitor the verification status of submitted incident reports.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="location.href='submit-report.html'">
                        Initiate Emergency Alert
                    </button>
                </div>
            </header>

            <div class="card animate-fade-in">
                <div class="card-title">
                    <span>Barangay Official Report Ledger</span>
                    <span class="badge badge-info">Automated Sync Enabled</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Report ID</th>
                                <th>Submitted</th>
                                <th>Disaster</th>
                                <th>Status</th>
                                <th>Severity</th>
                                <th>Evacuation</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTableBody">
                            <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-subtle);">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" style="display:none;" aria-hidden="true"></div>
            </div>

            <div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; padding:24px;">
                <div style="background:#fff;border-radius:12px;max-width:480px;width:100%;padding:24px;">
                    <h3 style="margin-bottom:16px;">Edit report</h3>
                    <input type="hidden" id="editReportId">
                    <div class="form-group"><label class="form-label">Disaster type</label><input type="text" id="editDisasterType" class="form-control"></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label class="form-label">Affected families</label><input type="number" id="editAff" class="form-control" min="0"></div>
                        <div class="form-group"><label class="form-label">Damaged houses</label><input type="number" id="editDam" class="form-control" min="0"></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label class="form-label">Injured</label><input type="number" id="editInj" class="form-control" min="0"></div>
                        <div class="form-group"><label class="form-label">Deaths</label><input type="number" id="editDeath" class="form-control" min="0"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Description</label><textarea id="editDesc" class="form-control" rows="4"></textarea></div>
                    <div style="display:flex;gap:12px;margin-top:8px;">
                        <button type="button" class="btn btn-primary" id="saveEditReport">Save</button>
                        <button type="button" class="btn" style="border:1px solid var(--border);" id="cancelEditReport">Cancel</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/relief-sidebar.js"></script>
    <script>
        const api = '../../php/api';

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await ReliefSidebar.mount();
            if (!user || user.user_type !== 'barangay_official') return;
            loadReports();
            document.getElementById('saveEditReport').addEventListener('click', saveEdit);
            document.getElementById('cancelEditReport').addEventListener('click', () => { document.getElementById('editModal').style.display = 'none'; });
        });

        function statusBadge(st) {
            const s = (st || '').toLowerCase();
            const cls = s === 'submitted' ? 'warning' : (s === 'relief_distributed' ? 'success' : 'info');
            return `<span class="badge badge-${cls}">${(st || '').replace('_', ' ').toUpperCase()}</span>`;
        }

        function esc(s) {
            if (s == null) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
        }

        function evacuationCell(r) {
            if (!r.suggested_evacuation_center_id) {
                return '<span style="font-size:12px;color:var(--text-subtle);">Waiting for MDRRMO guidance</span>';
            }
            const confirmed = !!r.evacuation_confirmed_at;
            const contact = r.suggested_evacuation_contact_phone ? `<div style="font-size:11px;color:var(--text-subtle);">Contact: ${esc(r.suggested_evacuation_contact_phone)}</div>` : '';
            const note = r.evacuation_suggestion_notes ? `<div style="font-size:11px;color:var(--text-subtle);max-width:280px;white-space:normal;">${esc(r.evacuation_suggestion_notes)}</div>` : '';
            return `
                <div style="font-weight:700;">${esc(r.suggested_evacuation_center_name)}</div>
                <div style="font-size:11px;color:var(--text-subtle);max-width:280px;white-space:normal;">${esc(r.suggested_evacuation_center_address || '')}</div>
                ${contact}
                ${note}
                ${confirmed ? '<span class="badge badge-success">EVACUATED</span>' : `<button type="button" class="btn btn-sm btn-primary" style="margin-top:6px;" onclick="confirmEvacuation(${r.id})">I evacuated here</button>`}
            `;
        }

        async function loadReports() {
            try {
                const response = await fetch(api + '/reports.php?action=list_user', { credentials: 'include' });
                const data = await response.json();
                const tbody = document.getElementById('reportsTableBody');
                if (!data.success || !data.reports || data.reports.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-subtle);">No reports yet. Submit one from the menu.</td></tr>';
                    return;
                }
                tbody.innerHTML = data.reports.map(r => {
                    const when = r.submitted_at ? new Date(r.submitted_at.replace(' ', 'T')).toLocaleString() : '—';
                    const canEdit = r.status === 'submitted';
                    return `<tr>
                        <td><span class="report-id">#${r.id}</span></td>
                        <td style="font-size:12px;">${when}</td>
                        <td><span class="badge badge-info">${esc((r.disaster_type || '').toUpperCase())}</span></td>
                        <td>${statusBadge(r.status)}</td>
                        <td><span class="badge badge-${r.severity_level === 'critical' ? 'danger' : 'primary'}">${esc((r.severity_level || '').toUpperCase())}</span></td>
                        <td>${evacuationCell(r)}</td>
                        <td>
                            ${canEdit ? `<button type="button" class="btn btn-sm btn-primary" onclick="openEdit(${r.id})">Edit</button>
                            <button type="button" class="btn btn-sm" style="border:1px solid var(--border);margin-left:4px;" onclick="deleteReport(${r.id})">Delete</button>` : '<span style="font-size:11px;color:var(--text-subtle);">Locked</span>'}
                        </td>
                    </tr>`;
                }).join('');
            } catch (error) { console.error('Reports error:', error); }
        }

        async function openEdit(id) {
            const res = await fetch(api + '/reports.php?action=get&report_id=' + id, { credentials: 'include' });
            const data = await res.json();
            if (!data.success || !data.report) return;
            const r = data.report;
            if (r.status !== 'submitted') { alert('Only submitted reports can be edited.'); return; }
            document.getElementById('editReportId').value = r.id;
            document.getElementById('editDisasterType').value = r.disaster_type || '';
            document.getElementById('editAff').value = r.affected_families;
            document.getElementById('editDam').value = r.damaged_houses;
            document.getElementById('editInj').value = r.injured_count;
            document.getElementById('editDeath').value = r.death_count;
            document.getElementById('editDesc').value = r.description || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveEdit() {
            const id = +document.getElementById('editReportId').value;
            const body = {
                report_id: id,
                disaster_type: document.getElementById('editDisasterType').value,
                affected_families: +document.getElementById('editAff').value,
                damaged_houses: +document.getElementById('editDam').value,
                injured_count: +document.getElementById('editInj').value,
                death_count: +document.getElementById('editDeath').value,
                description: document.getElementById('editDesc').value
            };
            const res = await fetch(api + '/reports.php?action=update_own', {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const j = await res.json();
            if (j.success) {
                document.getElementById('editModal').style.display = 'none';
                loadReports();
            } else alert(j.message || 'Update failed');
        }

        async function deleteReport(id) {
            if (!(await ReliefUI.confirm({ title: 'Delete report?', message: 'Delete this submitted report permanently?', confirmText: 'Delete', danger: true }))) return;
            const res = await fetch(api + '/reports.php?action=delete_own', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ report_id: id })
            });
            const j = await res.json();
            if (j.success) loadReports();
            else alert(j.message || 'Delete failed');
        }

        async function confirmEvacuation(id) {
            const notes = prompt('Optional note for MDRRMO, such as number of families already at the center:', '');
            if (notes === null) return;
            const res = await fetch(api + '/reports.php?action=confirm_evacuation', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ report_id: id, notes })
            });
            const j = await res.json();
            if (j.success) {
                alert('Evacuation confirmation sent.');
                loadReports();
            } else {
                alert(j.message || 'Confirmation failed');
            }
        }
    </script>
</body>
</html>
