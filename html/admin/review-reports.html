<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliefLink - Disaster Reports Review</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <style>
        .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
        .logo-box { width: 32px; height: 32px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; }
        .report-id { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--primary); background: #deebff; padding: 2px 6px; border-radius: 4px; }
        .assessment-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; margin-top: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .evac-panel { margin-top: 16px; padding: 14px; border: 1px solid var(--border); border-radius: 8px; background: #f8fafc; }
        .evac-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }
        @media (max-width: 760px) { .evac-grid { grid-template-columns: 1fr; } }
        .evac-nearby-list { margin-top: 10px; max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: #fafbfc; }
        .evac-nearby-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: background 0.15s; }
        .evac-nearby-item:last-child { border-bottom: none; }
        .evac-nearby-item:hover { background: #eef2ff; }
        .evac-nearby-item.is-selected { background: #deebff; }
        .evac-dist { flex-shrink: 0; font-weight: 700; color: var(--primary); font-size: 11px; white-space: nowrap; }
        .evac-dist.nearest { color: var(--success); }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" id="relief-sidebar-mount"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h2 style="font-size: 20px;">Disaster Reports</h2>
                    <p style="font-size: 13px; color: var(--text-subtle);">Review and validate incoming situation reports from barangay officials.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="button" class="btn" id="pendingToggleBtn" style="border: 1px solid var(--border); background: #fff;">Pending Only</button>
                    <button type="button" class="btn btn-primary" id="exportLedgerBtn">Export Report Ledger</button>
                </div>
            </header>

            <div class="card animate-fade-in">
                <div class="card-title">
                    <span>Active Incident Reports</span>
                    <div style="display: flex; gap: 12px; font-size: 11px;">
                        <span style="display: flex; align-items: center; gap: 4px;"><div class="dot" style="background: var(--warning);"></div> Submitted</span>
                        <span style="display: flex; align-items: center; gap: 4px;"><div class="dot" style="background: var(--success);"></div> Reviewed</span>
                        <span style="display: flex; align-items: center; gap: 4px;"><div class="dot" style="background: var(--danger);"></div> Critical severity</span>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Report ID</th>
                                <th>Barangay</th>
                                <th>Disaster Type</th>
                                <th>Submitted</th>
                                <th>Status</th>
                                <th>Active Review</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTableBody">
                            <!-- Populated by JS -->
                            <tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-subtle);">Synchronizing with field units...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Detail Modal -->
            <div id="reportModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:24px;" onclick="if(event.target.id==='reportModal')closeReportModal()">
                <div class="card" style="max-width: 720px; width: 100%; max-height: calc(100vh - 48px); margin: 0; position:relative; display: flex; flex-direction: column; padding: 24px; box-sizing: border-box; overflow: hidden; background: #fff; border-radius: 12px;">
                    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; margin-top: 0; margin-bottom: 16px; flex-shrink: 0; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
                        <span style="font-weight: 700; font-size: 18px; color: var(--text-main);">Report details</span>
                        <button type="button" onclick="closeReportModal()" style="border:none; background:none; cursor:pointer; font-size:24px; line-height:1; color: var(--text-subtle); padding: 0;">&times;</button>
                    </div>
                    <div style="flex: 1; overflow-y: auto; padding-right: 6px; display: flex; flex-direction: column; min-height: 0;">
                        <div id="modalContent"></div>
                        <div id="reportDetailMap" style="height:220px;border-radius:8px;margin-top:12px;border:1px solid var(--border);margin-bottom:8px;flex-shrink: 0;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../js/relief-ajax.js"></script>
    <script src="../js/report-structured.js"></script>
    <script src="../js/relief-sidebar.js"></script>
    <script>
        let reportRows = [];
        let pendingOnly = false;
        let detailMap = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await ReliefSidebar.mount();
            if (!user || user.user_type !== 'admin') return;
            loadReports();
            document.getElementById('pendingToggleBtn').addEventListener('click', () => {
                pendingOnly = !pendingOnly;
                document.getElementById('pendingToggleBtn').textContent = pendingOnly ? 'Show All' : 'Pending Only';
                loadReports();
            });
            document.getElementById('exportLedgerBtn').addEventListener('click', exportLedger);
        });

        function esc(s) {
            if (s == null) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
        }

        function renderDescriptionField(rawText) {
            return ReliefStructuredReport.renderHtml(ReliefStructuredReport.parseDescription(rawText || ''), esc);
        }

        function renderProofOfDelivery(r) {
            if (String(r.status || '').toLowerCase() !== 'relief_received') return '';
            const when = r.delivery_confirmed_at
                ? esc(new Date(String(r.delivery_confirmed_at).replace(' ', 'T')).toLocaleString())
                : '—';
            let html = '<div style="margin-top:16px;padding:14px;border:1px solid var(--border);border-radius:8px;background:#f0fdf4;">';
            html += '<div style="font-weight:700;font-size:12px;text-transform:uppercase;color:var(--success);margin-bottom:10px;">Proof of delivery</div>';
            html += '<div style="font-size:12px;color:var(--text-subtle);margin-bottom:10px;">Confirmed by barangay: ' + when + '</div>';
            if (r.proof_of_delivery_photo) {
                html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;">Delivery photo</strong><br><img src="' + esc(r.proof_of_delivery_photo) + '" alt="Proof" style="max-width:100%;border-radius:6px;margin-top:6px;border:1px solid var(--border);"></div>';
            }
            if (r.delivery_signature_data) {
                html += '<div><strong style="font-size:12px;">Digital signature</strong><br><img src="' + esc(r.delivery_signature_data) + '" alt="Signature" style="max-width:100%;height:120px;border-radius:6px;margin-top:6px;background:#fff;border:1px solid var(--border);"></div>';
            }
            html += '</div>';
            return html;
        }

        function statusBadgeClass(status) {
            const s = String(status || '').toLowerCase();
            if (s === 'submitted') return 'warning';
            if (s === 'reviewed') return 'success';
            if (s === 'prioritized') return 'info';
            if (s === 'relief_distributed') return 'success';
            if (s === 'relief_received') return 'success';
            return 'info';
        }

        function reviewDotColor(r) {
            if (String(r.severity_level || '').toLowerCase() === 'critical') return 'var(--danger)';
            const s = String(r.status || '').toLowerCase();
            if (s === 'submitted') return 'var(--warning)';
            if (s === 'reviewed' || s === 'relief_distributed') return 'var(--success)';
            return 'var(--primary)';
        }

        async function loadReports() {
            try {
                const q = pendingOnly ? '&status=submitted' : '';
                const response = await fetch('../../php/api/reports.php?action=list_all' + q, { credentials: 'include' });
                const data = await response.json();
                if (!data.success) return;
                reportRows = data.reports || [];
                const tbody = document.getElementById('reportsTableBody');
                tbody.innerHTML = reportRows.map(r => `
                        <tr>
                            <td><button type="button" class="report-id" style="cursor:pointer;border:none;" onclick="openReportDetail(${r.id})">REP-2024-${String(r.id).padStart(4, '0')}</button></td>
                            <td>
                                <div style="font-weight: 600;">${esc(r.barangay_name)}</div>
                                <div style="font-size: 11px; color: var(--text-subtle); line-height: 1.4; margin-top: 2px;">
                                    Families: <strong>${esc(r.affected_families)}</strong> · Damaged: <strong>${esc(r.damaged_houses)}</strong><br>
                                    Injured/Deaths: <strong style="color: ${(+r.injured_count > 0 || +r.death_count > 0) ? 'var(--danger)' : 'inherit'};">${esc(r.injured_count)}/${esc(r.death_count)}</strong>
                                </div>
                            </td>
                            <td><span class="badge badge-info">${esc(String(r.disaster_type || '').toUpperCase())}</span></td>
                            <td style="font-size:12px;">${esc(r.submitted_at ? new Date(String(r.submitted_at).replace(' ', 'T')).toLocaleString() : '-')}</td>
                            <td><span class="badge badge-${statusBadgeClass(r.status)}">${esc(String(r.status || '').replace('_', ' ').toUpperCase())}</span></td>
                            <td>
                                <div class="assessment-badge">
                                    <div class="dot" style="background: ${reviewDotColor(r)};"></div>
                                    <span>${esc(String(r.severity_level || '').toUpperCase())} ASSESSMENT</span>
                                </div>
                                <div style="font-size:11px;color:var(--text-subtle);margin-top:4px;">
                                    ${r.suggested_evacuation_center_name ? 'Evac: ' + esc(r.suggested_evacuation_center_name) + (r.evacuation_confirmed_at ? ' - confirmed' : ' - pending') : 'No evacuation guidance'}
                                </div>
                            </td>
                            <td>
                                <button type="button" class="btn btn-sm btn-primary" onclick="openReportDetail(${r.id})">Details</button>
                                <button type="button" class="btn btn-sm btn-primary" onclick="approveReport(${r.id})">Verify</button>
                                <button type="button" class="btn btn-sm btn-primary" style="margin-left:4px;background:#172b4d;" onclick="deployAid(${r.id})">Deploy Aid</button>
                                <button type="button" class="btn btn-sm" style="border: 1px solid var(--border); margin-left: 4px;" onclick="rejectReport(${r.id})">Return</button>
                            </td>
                        </tr>
                    `).join('');
            } catch (error) { console.error('Reports error:', error); }
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            if (detailMap) {
                detailMap.remove();
                detailMap = null;
            }
        }

        async function openReportDetail(id) {
            const modal = document.getElementById('reportModal');
            const content = document.getElementById('modalContent');
            modal.style.display = 'flex';
            content.innerHTML = '<p style="color:var(--text-subtle);">Loading…</p>';
            if (detailMap) { detailMap.remove(); detailMap = null; }
            try {
                const res = await fetch('../../php/api/reports.php?action=get&report_id=' + id, { credentials: 'include' });
                const data = await res.json();
                if (!data.success || !data.report) {
                    content.innerHTML = '<p>Could not load report.</p>';
                    return;
                }
                const r = data.report;
                const when = r.submitted_at ? new Date(String(r.submitted_at).replace(' ','T')).toLocaleString() : '—';
                content.innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;">
                        <div><strong>Barangay</strong><br>${esc(r.barangay_name)}</div>
                        <div><strong>Submitted by</strong><br>${esc(r.submitted_by)}</div>
                        <div><strong>Disaster type</strong><br>${esc(r.disaster_type)}</div>
                        <div><strong>Status</strong><br>${esc(r.status)}</div>
                        <div><strong>Severity</strong><br>${esc(r.severity_level)}</div>
                        <div><strong>Logged</strong><br>${esc(when)}</div>
                        <div><strong>Affected families</strong><br>${esc(r.affected_families)}</div>
                        <div><strong>Damaged houses</strong><br>${esc(r.damaged_houses)}</div>
                        <div><strong>Injured / Deaths</strong><br>${esc(r.injured_count)} / ${esc(r.death_count)}</div>
                        <div><strong>Weather (at submit)</strong><br>${esc(r.weather_condition)} · ${r.temperature != null ? esc(r.temperature) + '°C' : '—'} · RH ${r.humidity != null ? esc(r.humidity) : '—'}%</div>
                    </div>
                    <div style="margin-top:12px;"><strong>Geographic sector</strong><br>${esc(r.geographic_sector_label || '—')}</div>
                    <div style="margin-top:16px;margin-bottom:16px;">
                        <strong style="display:block;margin-bottom:8px;font-size:13px;color:var(--text-main);">Situational Assessment & Logistical Intel</strong>
                        ${renderDescriptionField(r.description)}
                    </div>
                    ${renderProofOfDelivery(r)}
                    <div class="evac-panel">
                        <div class="card-title" style="margin-bottom:10px;">
                            <span>Evacuation guidance</span>
                            <span class="badge badge-${r.evacuation_confirmed_at ? 'success' : (r.suggested_evacuation_center_id ? 'warning' : 'info')}">${r.evacuation_confirmed_at ? 'CONFIRMED' : (r.suggested_evacuation_center_id ? 'PENDING USER' : 'NOT SET')}</span>
                        </div>
                        <div class="evac-grid">
                            <div>
                                <div class="form-group">
                                    <label class="form-label">Nearest evacuation centers (Daet)</label>
                                    <select id="evacCenterSelect" class="form-control"><option value="">Loading centers...</option></select>
                                    <div id="evacNearbyList" class="evac-nearby-list" style="display:none;"></div>
                                    <p id="evacNearbyHint" style="font-size:11px;color:var(--text-subtle);margin-top:6px;"></p>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Instruction note</label>
                                    <textarea id="evacSuggestionNotes" class="form-control" rows="3" placeholder="Example: Bring family kits and coordinate with the center desk.">${esc(r.evacuation_suggestion_notes || '')}</textarea>
                                </div>
                                <button type="button" class="btn btn-primary" onclick="suggestEvacuation(${r.id})">Send evacuation suggestion</button>
                            </div>
                            <div style="font-size:13px;color:var(--text-subtle);">
                                <strong style="color:var(--text-main);">Current guidance</strong><br>
                                ${r.suggested_evacuation_center_name ? esc(r.suggested_evacuation_center_name) : 'No center suggested yet.'}<br>
                                ${r.suggested_evacuation_center_address ? esc(r.suggested_evacuation_center_address) + '<br>' : ''}
                                ${r.suggested_evacuation_contact_phone ? 'Contact: ' + esc(r.suggested_evacuation_contact_phone) + '<br>' : ''}
                                ${r.evacuation_suggested_at ? 'Sent: ' + esc(new Date(String(r.evacuation_suggested_at).replace(' ','T')).toLocaleString()) + '<br>' : ''}
                                ${r.evacuation_confirmed_at ? '<span style="color:var(--success);font-weight:700;">User confirmed evacuation: ' + esc(new Date(String(r.evacuation_confirmed_at).replace(' ','T')).toLocaleString()) + '</span><br>' : ''}
                                ${r.evacuation_confirmation_notes ? '<span style="white-space:pre-wrap;">' + esc(r.evacuation_confirmation_notes) + '</span>' : ''}
                            </div>
                        </div>
                    </div>
                    <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;">
                        <button type="button" class="btn btn-primary" onclick="deployAid(${r.id})">Deploy Aid (deduct inventory)</button>
                        <button type="button" class="btn" style="border:1px solid var(--border);" onclick="approveReport(${r.id})">Verify only</button>
                    </div>
                `;
                await loadEvacuationChoices(r.barangay_id, r.suggested_evacuation_center_id, r.map_latitude, r.map_longitude);
                if (typeof L !== 'undefined' && r.map_latitude && r.map_longitude) {
                    setTimeout(() => initReportDetailMap(r), 120);
                }
            } catch (e) {
                content.innerHTML = '<p>Network error.</p>';
            }
        }

        function formatEvacDistance(meters) {
            if (meters == null || meters === '' || isNaN(meters)) return '—';
            const m = Number(meters);
            if (m < 1000) return Math.round(m) + ' m';
            return (m / 1000).toFixed(1) + ' km';
        }

        let evacCentersForMap = [];

        async function loadEvacuationChoices(barangayId, selectedId, reportLat, reportLon) {
            const select = document.getElementById('evacCenterSelect');
            const listEl = document.getElementById('evacNearbyList');
            const hintEl = document.getElementById('evacNearbyHint');
            if (!select) return;
            select.innerHTML = '<option value="">Loading nearby centers...</option>';
            if (listEl) { listEl.style.display = 'none'; listEl.innerHTML = ''; }
            if (hintEl) hintEl.textContent = '';
            try {
                const params = {
                    report_barangay_id: barangayId,
                    municipality: 'Daet',
                };
                if (reportLat != null && reportLon != null) {
                    params.latitude = reportLat;
                    params.longitude = reportLon;
                }
                const data = await ReliefAjax.evacuation.listNearby(params);
                const centers = data.success && Array.isArray(data.centers) ? data.centers : [];
                evacCentersForMap = centers;

                if (!centers.length) {
                    select.innerHTML = '<option value="">No evacuation centers registered in Daet</option>';
                    if (hintEl) hintEl.textContent = 'Add centers under Evacuation Centers in the admin menu.';
                    return;
                }

                select.innerHTML = '<option value="">Select nearest center</option>' + centers.map((c, idx) => {
                    const disabled = c.status === 'closed' ? ' disabled' : '';
                    const selected = String(c.id) === String(selectedId || '') ? ' selected' : '';
                    const dist = formatEvacDistance(c.distance_m);
                    const brgy = c.barangay_name ? ' · ' + c.barangay_name : '';
                    const tag = idx === 0 && c.distance_m != null ? ' [nearest]' : '';
                    return `<option value="${esc(c.id)}"${selected}${disabled}>${esc(c.center_name)} — ${dist}${brgy}${tag} (${esc(c.current_occupancy)}/${esc(c.capacity)})</option>`;
                }).join('');

                if (listEl) {
                    listEl.style.display = 'block';
                    listEl.innerHTML = centers.map((c, idx) => {
                        const dist = formatEvacDistance(c.distance_m);
                        const distClass = idx === 0 && c.distance_m != null ? ' evac-dist nearest' : ' evac-dist';
                        const same = c.same_barangay ? '<span class="badge badge-info" style="font-size:9px;margin-left:4px;">Same barangay</span>' : '';
                        const statusCls = c.status === 'open' ? 'success' : (c.status === 'full' ? 'warning' : 'danger');
                        return `<div class="evac-nearby-item${String(c.id) === String(selectedId || '') ? ' is-selected' : ''}" data-center-id="${esc(c.id)}" role="button" tabindex="0">
                            <div>
                                <div style="font-weight:700;color:var(--text-main);">${esc(c.center_name)}${same}</div>
                                <div style="color:var(--text-subtle);margin-top:2px;">${esc(c.barangay_name || '')} · ${esc(c.address || '')}</div>
                                <div style="margin-top:4px;"><span class="badge badge-${statusCls}">${esc(String(c.status || '').toUpperCase())}</span>
                                <span style="margin-left:6px;color:var(--text-subtle);">${esc(c.current_occupancy)}/${esc(c.capacity)} persons</span></div>
                            </div>
                            <span class="${distClass.trim()}">${dist}</span>
                        </div>`;
                    }).join('');

                    listEl.querySelectorAll('.evac-nearby-item').forEach((row) => {
                        const pick = () => {
                            const id = row.getAttribute('data-center-id');
                            select.value = id;
                            listEl.querySelectorAll('.evac-nearby-item').forEach((el) => el.classList.remove('is-selected'));
                            row.classList.add('is-selected');
                        };
                        row.addEventListener('click', pick);
                        row.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick(); } });
                    });
                }

                if (hintEl) {
                    const nearest = centers[0];
                    if (nearest && nearest.distance_m != null) {
                        hintEl.textContent = 'Sorted by distance from the report pin (straight-line). Nearest: ' + nearest.center_name + ' (' + formatEvacDistance(nearest.distance_m) + ').';
                    } else {
                        hintEl.textContent = 'Distances use straight-line measure from the report map pin when available.';
                    }
                }
            } catch (e) {
                select.innerHTML = '<option value="">Could not load centers</option>';
            }
        }

        function initReportDetailMap(r) {
            const el = document.getElementById('reportDetailMap');
            if (!el || typeof L === 'undefined') return;
            if (detailMap) { detailMap.remove(); detailMap = null; }
            const rLat = +r.map_latitude;
            const rLon = +r.map_longitude;
            detailMap = L.map(el).setView([rLat, rLon], 14);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '&copy; Esri' }).addTo(detailMap);
            const reportIcon = L.divIcon({
                className: 'report-pin',
                html: '<div style="width: 18px; height: 18px; background: #ff5630; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px #ff5630;"></div>',
                iconSize: [18, 18],
                iconAnchor: [9, 9],
            });
            L.marker([rLat, rLon], { icon: reportIcon }).addTo(detailMap).bindPopup('<strong>Report location</strong>').openPopup();

            const bounds = L.latLngBounds([[rLat, rLon]]);
            (evacCentersForMap || []).slice(0, 8).forEach((c) => {
                const lat = parseFloat(c.latitude);
                const lon = parseFloat(c.longitude);
                if (isNaN(lat) || isNaN(lon)) return;
                const dist = formatEvacDistance(c.distance_m);
                L.marker([lat, lon], {
                    icon: L.divIcon({
                        className: '',
                        html: '<div style="background:#0052cc;color:#fff;font-size:9px;font-weight:700;padding:3px 6px;border-radius:4px;white-space:nowrap;border:1px solid #fff;">' + dist + '</div>',
                        iconAnchor: [20, 10],
                    }),
                }).bindPopup('<strong>' + String(c.center_name || '') + '</strong><br>' + dist + ' from report<br>' + String(c.barangay_name || '')).addTo(detailMap);
                bounds.extend([lat, lon]);
            });
            if (bounds.isValid()) detailMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
            detailMap.invalidateSize();
        }

        async function suggestEvacuation(reportId) {
            const centerId = document.getElementById('evacCenterSelect')?.value || '';
            const notes = document.getElementById('evacSuggestionNotes')?.value || '';
            if (!centerId) { alert('Select an evacuation center first.'); return; }
            try {
                const response = await fetch('../../php/api/reports.php?action=suggest_evacuation', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ report_id: reportId, evacuation_center_id: centerId, notes })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Evacuation suggestion sent to the barangay account.');
                    openReportDetail(reportId);
                    loadReports();
                } else {
                    alert(data.message || 'Could not send evacuation suggestion.');
                }
            } catch (error) {
                alert('Request failed.');
            }
        }

        function exportLedger() {
            if (!reportRows.length) { alert('No rows to export.'); return; }
            const cols = ['id','barangay_name','disaster_type','status','severity_level','affected_families','damaged_houses','submitted_at','map_latitude','map_longitude','geographic_sector_label'];
            const lines = [cols.join(',')];
            reportRows.forEach(r => {
                lines.push(cols.map(c => {
                    let v = r[c] != null ? r[c] : '';
                    v = String(v).replace(/"/g, '""');
                    if (/[",\n]/.test(v)) v = '"' + v + '"';
                    return v;
                }).join(','));
            });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/csv' }));
            a.download = 'relieflink-disaster-reports.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        async function rejectReport(id) {
            if (!(await ReliefUI.confirm({ title: 'Return report?', message: 'Return this report to submitted status for the barangay to revise.', confirmText: 'Return report' }))) return;
            try {
                const response = await fetch('../../php/api/reports.php?action=update_status', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ report_id: id, status: 'submitted' })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Report returned to submitted status.');
                    loadReports();
                } else alert(data.message || 'Update failed');
            } catch (error) { alert('Request failed.'); }
        }

        async function deployAid(id) {
            if (!(await ReliefUI.confirm({
                title: 'Deploy aid?',
                message: 'This will deduct requested food, hygiene, and water quantities from central inventory and mark the report as relief distributed.',
                confirmText: 'Deploy aid',
            }))) return;
            try {
                const data = await ReliefAjax.reports.deployAid(id);
                if (data.success) {
                    await ReliefUI.alert({ title: 'Deployment complete', message: data.message || 'Inventory deducted.' });
                    closeReportModal();
                    loadReports();
                } else {
                    await ReliefUI.alert({ title: 'Cannot deploy', message: data.message || 'Deployment failed.' });
                }
            } catch (e) {
                await ReliefUI.alert({ title: 'Error', message: 'Request failed.' });
            }
        }

        async function approveReport(id) {
            if (!(await ReliefUI.confirm({ title: 'Verify report?', message: 'Mark this disaster report as reviewed and add it to the priority workflow.', confirmText: 'Verify' }))) return;
            try {
                const response = await fetch('../../php/api/reports.php?action=update_status', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ report_id: id, status: 'reviewed' })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Report verified and added to priority engine.');
                    closeReportModal();
                    loadReports();
                }
            } catch (error) { alert('Verification failed.'); }
        }
    </script>
</body>
</html>
