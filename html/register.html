<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliefLink - Official Registration</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .registration-header { text-align: center; margin-bottom: 32px; }
        .registration-header .brand { color: var(--primary); font-weight: 800; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .registration-header .sub-brand { font-size: 10px; font-weight: 600; color: var(--text-subtle); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 24px; }
        .registration-header h2 { font-size: 20px; font-weight: 700; color: #172b4d; }
        .registration-header p { font-size: 13px; color: var(--text-subtle); margin-top: 8px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container animate-fade-in" style="max-width: 500px;">
        <div class="auth-card">
            <div class="registration-header">
                <div class="brand">ReliefLink Core</div>
                <div class="sub-brand">Disaster Command & Relief Portal</div>
                <h2>Official Registration</h2>
                <p>Register as a barangay official for the <strong>Municipality of Daet, Camarines Norte</strong>.</p>
            </div>

            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-control" required placeholder="Juan Dela Cruz">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="juan@province.gov">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Barangay Selection</label>
                        <select id="barangay" class="form-control" required>
                            <option value="" disabled selected>Select Barangay (Daet)</option>
                            <option value="Alawihao">Alawihao</option>
                            <option value="Awitan">Awitan</option>
                            <option value="Bagasbas">Bagasbas</option>
                            <option value="Barangay I">Barangay I</option>
                            <option value="Barangay II">Barangay II</option>
                            <option value="Barangay III">Barangay III</option>
                            <option value="Barangay IV">Barangay IV</option>
                            <option value="Barangay V">Barangay V</option>
                            <option value="Barangay VI">Barangay VI</option>
                            <option value="Barangay VII">Barangay VII</option>
                            <option value="Barangay VIII">Barangay VIII</option>
                            <option value="Bibirao">Bibirao</option>
                            <option value="Borabod">Borabod</option>
                            <option value="Calasgasan">Calasgasan</option>
                            <option value="Camambugan">Camambugan</option>
                            <option value="Cobangbang">Cobangbang</option>
                            <option value="Dogongan">Dogongan</option>
                            <option value="Gahonon">Gahonon</option>
                            <option value="Gubat">Gubat</option>
                            <option value="Lag-on">Lag-on</option>
                            <option value="Magang">Magang</option>
                            <option value="Mambalite">Mambalite</option>
                            <option value="Mancruz">Mancruz</option>
                            <option value="Pamorangon">Pamorangon</option>
                            <option value="Poblacion">Poblacion</option>
                            <option value="San Isidro">San Isidro</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="j.delacruz_admin">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                            <button type="button" class="password-toggle" onclick="togglePass('password')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-subtle); padding: 0; display: flex; align-items: center; justify-content: center;"><svg viewBox="0 0 24 24" aria-hidden="true" style="width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none;"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div style="position: relative;">
                            <input type="password" id="confirmPassword" class="form-control" required placeholder="••••••••">
                            <button type="button" class="password-toggle" onclick="togglePass('confirmPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-subtle); padding: 0; display: flex; align-items: center; justify-content: center;"><svg viewBox="0 0 24 24" aria-hidden="true" style="width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none;"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">
                    Register Account <span style="margin-left: 8px;">→</span>
                </button>

                <div id="registerError" class="form-error" style="text-align: center; margin-top: 16px;"></div>
            </form>

            <div style="text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
                <p style="font-size: 13px; color: var(--text-subtle);">
                    Already registered? <a href="login.html" style="font-weight: 600;">Back to Login</a>
                </p>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 32px; opacity: 0.6;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="width: 12px; height: 12px; background: #0052cc; border-radius: 2px;"></div>
                    <span style="font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;">Build Accredited</span>
                </div>
                <span style="font-size: 8px; color: var(--text-subtle);">© 2024 RELIEFLINK SYSTEM</span>
            </div>
        </div>
    </div>

    <script src="../js/relief-ajax.js"></script>
    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                document.getElementById('registerError').textContent = 'Passwords do not match';
                return;
            }

            btn.classList.add('btn-loading');
            btn.disabled = true;

            const formData = {
                full_name: document.getElementById('fullName').value,
                barangay_name: document.getElementById('barangay').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password
            };

            try {
                const data = await ReliefAjax.auth.register(formData);

                if (data.success) {
                    alert('Registration successful! Access granted.');
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('registerError').textContent = data.message || 'Registration failed';
                    btn.classList.remove('btn-loading');
                    btn.disabled = false;
                }
            } catch (error) {
                document.getElementById('registerError').textContent = 'System error occurred.';
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        });
    </script>
    <script src="../js/validation.js"></script>
</body>
</html>
